server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ── Frontend (built Vue 3 SPA) ──────────────────────────────
    root /opt/tasleem/frontend/dist;
    index index.html;

    # Long-cache fingerprinted assets emitted by Vite
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every non-asset, non-API, non-AI request serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend API (Laravel via artisan serve on 127.0.0.1:8000) ─
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── AI service (FastAPI on 127.0.0.1:8080) ───────────────────
    location /ai/ {
        proxy_pass http://127.0.0.1:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # /ai/detect/electronic accepts multipart uploads up to 10 MB
        client_max_body_size 10m;
        proxy_read_timeout 120s;
    }

    # Hide dotfiles and the Laravel storage driver surface
    location ~ /\. { deny all; }
    location = /server-status { deny all; }
}
